// Bug 1353055 - Strip 'vars' debugging information to agree with moz.build.
ext.configureVariantDebugLevel = { variantName, buildType ->
    // The default is 'lines,source,vars', which includes debugging information
    // that is quite large: roughly 500kb for Fennec.  Therefore we remove
    // 'vars' unless we're producing a debug build, where it is useful.
    if (!'debug'.equals(buildType) || mozconfig.substs.MOZILLA_OFFICIAL) {
        // `onVariants` runs before AGP creates the javac task, so defer with `configureEach`.
        tasks.matching { it.name == "compile${variantName.capitalize()}JavaWithJavac" }.configureEach {
            options.debugOptions.debugLevel = 'lines,source'
        }
    }
}
