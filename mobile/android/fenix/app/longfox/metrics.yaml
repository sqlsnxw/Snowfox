---
$schema: moz://mozilla.org/schemas/glean/metrics/2-0-0

no_lint:
  - CATEGORY_GENERIC

longfox:
  entry_point_shown:
    type: event
    description: Sent when the longfox entry point CTA is shown on the home page.
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2039559
    data_reviews:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2039559
    data_sensitivity:
      - interaction
    notification_emails:
      - android-probes@mozilla.com
    expires: never
  game_launched:
    type: event
    description: Sent when the longfox game is launched (the entry point is clicked).
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2039559
    data_reviews:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2039559
    data_sensitivity:
      - interaction
    notification_emails:
      - android-probes@mozilla.com
    expires: never
  game_played_length:
    type: timing_distribution
    time_unit: millisecond
    description: Sent when the longfox game is played.
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2039559
    data_reviews:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2039559
    data_sensitivity:
      - interaction
    notification_emails:
      - android-probes@mozilla.com
    expires: never
