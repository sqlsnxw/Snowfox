<html>
  <head>
    <meta charset="utf-8" />
    <title>Datalist</title>
    <meta name="viewport" content="minimum-scale=1,width=device-width" />
  </head>
  <body>
    <input type="text" list="list" />
    <datalist id="list">
      <option value="foo">foo</option>
      <option value="bar">bar</option>
      <option value="baz">baz</option>
    </datalist>
  </body>
</html>
