---
loader: taskgraph.loader.transform:loader

transforms:
    - gecko_taskgraph.transforms.release:run_on_releases
    - taskgraph.transforms.task_context
    - gecko_taskgraph.transforms.release_flatpak_push:transforms
    - gecko_taskgraph.transforms.task:transforms

kind-dependencies:
    - repackage-flatpak

task-defaults:
    run-on-repo-type: [hg]
    description: Pushes Flatpaks onto Flathub
    run-on-projects: []  # to make sure this never runs as part of CI
    run-on-releases: [beta, release]
    shipping-phase: ship
    task-context:
        from-parameters:
            release-type: release_type
        from-custom:
            - release-level
        substitution-fields:
            - worker.channel
            - worker-type
    treeherder:
        kind: build
        tier: 2
        symbol: Flatpak(push)
    worker-type: pushflatpak
    worker:
        implementation: push-flatpak
        channel:
            by-release-type:
                beta: beta
                release: stable
                default: mock
    shipping-product: firefox
    flathub-scope: "flathub:firefox"

tasks:
    firefox-linux64:
        treeherder:
            platform: linux64-shippable/opt
        dependencies:
            repackage-flatpak: repackage-flatpak-linux64-shippable/opt

    firefox-linux64-aarch64:
        treeherder:
            platform: linux64-aarch64-shippable/opt
        dependencies:
            repackage-flatpak: repackage-flatpak-linux64-aarch64-shippable/opt
