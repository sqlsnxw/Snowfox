---
loader: taskgraph.loader.transform:loader

transforms:
    - taskgraph.transforms.from_deps
    - gecko_taskgraph.transforms.filter_notarization
    - gecko_taskgraph.transforms.name_sanity
    - gecko_taskgraph.transforms.repackage_pkg_notarization
    - gecko_taskgraph.transforms.signing
    - gecko_taskgraph.transforms.task

kind-dependencies:
    - repackage-l10n-pkg-signing

only-for-attributes:
    - shippable

tasks:
    repackage-l10n-pkg-notarization:
        run-on-repo-type: [hg, git]
        from-deps:
            group-by: chunk-locales
            copy-attributes: true
        treeherder:
            symbol: N
            group: pkg-Rpk
