---
task-defaults:
    description: "profiler-node-tools toolchain build"
    attributes:
        local-toolchain: true
    worker-type: b-linux-docker-amd
    worker:
        max-run-time: 1800

profiler-node-tools:
    description: "profiler node tools from firefox profiler"
    treeherder:
        symbol: TL(profiler-node-tools)
    run:
        script: build-profiler-node-tools.sh
        toolchain-artifact: public/build/profiler-node-tools.tar.zst
    fetches:
        fetch:
            - firefox-profiler
        toolchain:
            - linux64-node-24
