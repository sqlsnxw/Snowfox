---
task-defaults:
    worker-type:
        by-test-platform:
            windows11-64-24h2-asan/.*: win11-64-25h2-large
            windows11-(32|64)-24h2(-ccov|-devedition|-mingwclang|-shippable)?/.*: win11-64-25h2
            windows11-aarch64-24h2(-devedition|-shippable)?/.*: win11-a64-25h2
            default: default
    mozharness:
        script: marionette.py
        config:
            by-test-platform:
                macosx.*:
                    - marionette/prod_config.py
                    - marionette/mac_taskcluster_config.py
                windows.*:
                    - marionette/windows_taskcluster_config.py
                linux.*:
                    - marionette/prod_config.py
                    - unittests/linux_dbus-python.py
                    - remove_executables.py
                default:
                    - marionette/prod_config.py
                    - remove_executables.py
    virtualization: virtual

marionette-unittest:
    description: "Marionette unittest run"
    treeherder-symbol: Mn(unit)
    variants:
        - webrender-sw
        - headless
    run-on-projects:
        by-variant:
            headless:
                by-test-platform:
                    linux.*64(-shippable)?(-qr)?/opt: built-projects
                    default: []
            webrender-sw:
                by-test-platform:
                    .*-wayland.*: []
                    # Compositor shutdown assertion in DisconnectApzcTreeManager
                    # on headless macOS aarch64 VM workers (Bug 2039987 family).
                    macosx1500-aarch64-vms/debug: []
                    .*/debug: built-projects
                    default: []
            default:
                by-test-platform:
                    .*-wayland.*: []
                    # Compositor shutdown assertion in DisconnectApzcTreeManager
                    # on headless macOS aarch64 VM workers (Bug 2039987 family).
                    macosx1500-aarch64-vms/debug: []
                    default: built-projects
    tier:
        by-variant:
            headless: 2
            default: default
    max-run-time:
        by-test-platform:
            .*-asan.*: 3600
            .*-tsan.*: 4500
            .*/debug: 3600
            default: 1800
    instance-size: default
    chunks: 1
    suite: marionette-unittest
    test-manifest-loader: null  # don't load in taskgraph
    mozharness:
        extra-options:
            - --subsuite=marionette-unittest
            - --test-manifest=unit/unit-tests.toml

marionette-integration:
    description: "Marionette integration run"
    treeherder-symbol: Mn()
    suite: marionette-integration
    variants:
        - webrender-sw
        - headless
        - inc-origin-init
    run-on-projects:
        by-variant:
            headless:
                by-test-platform:
                    linux.*64(-shippable)?(-qr)?/opt: built-projects
                    default: []
            webrender-sw:
                by-test-platform:
                    .*-wayland.*: []
                    # Compositor shutdown assertion in DisconnectApzcTreeManager
                    # on headless macOS aarch64 VM workers (Bug 2039987 family).
                    macosx1500-aarch64-vms/debug: []
                    .*/debug: built-projects
                    default: []
            inc-origin-init: []
            default:
                by-test-platform:
                    .*-wayland.*: []
                    # Compositor shutdown assertion in DisconnectApzcTreeManager
                    # on headless macOS aarch64 VM workers (Bug 2039987 family).
                    macosx1500-aarch64-vms/debug: []
                    default: built-projects
    tier:
        by-variant:
            headless: 2
            default: default
    max-run-time:
        by-test-platform:
            .*-asan.*: 3600
            .*-tsan.*: 3600
            .*-ccov.*: 3600
            .*/debug: 3600
            default: 2700
    instance-size: default
    chunks: dynamic
    default-chunks:
        by-test-platform:
            .*-asan.*: 2
            .*-tsan.*: 2
            default: 1
    mozharness:
        extra-options:
            - --subsuite=marionette-integration
            - --test-manifest=integration-tests.toml
