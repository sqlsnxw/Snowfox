<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin" type="text/css"?>
<?xml-stylesheet href="chrome://mochikit/content/tests/SimpleTest/test.css"
                 type="text/css"?>
<?xml-stylesheet href="../nsIAccessible_name.css"
                 type="text/css"?>


<window xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
        xmlns:html="http://www.w3.org/1999/xhtml"
        title="nsIAccessible actions testing">

  <script src="chrome://mochikit/content/tests/SimpleTest/SimpleTest.js" />

  <script type="application/javascript"
          src="../common.js" />
  <script type="application/javascript"
          src="../events.js" />
  <script type="application/javascript"
          src="../actions.js" />
  <script type="application/javascript"
          src="../role.js" />
  <script type="application/javascript"
          src="../states.js" />

  <script type="application/javascript">
  <![CDATA[
    SimpleTest.expectAssertions(0, 1);

    async function doTest()
    {
      await testAction({
        id: "menu",
        actionName: "click",
        events: CLICK_EVENTS,
        // Wait for the submenu to show up.
        eventSeq: [
          [EVENT_SHOW, getNode("submenu")]
        ]
      });

      await testAction({
        id: "submenu",
        actionName: "click",
        events: CLICK_EVENTS
      });

      await testAction({
        id: "menuitem",
        actionName: "click",
        events: XUL_EVENTS
      });

      await testAction({
        id: "button",
        actionName: "press",
        events: XUL_EVENTS
      });

      await testAction({
        id: "buttonmenu",
        actionName: "press",
        events: CLICK_EVENTS
      });

      await testAction({
        id: "name_entry_label",
        actionName: "click",
        events: CLICK_EVENTS
      });

      await testAction({
        id: "labelWithPopup",
        actionName: "click",
        events: CLICK_EVENTS
      });

      await testAction({
        id: "toolbarbutton_label",
        actionName: "click",
        targetId: "toolbarbutton",
        events: XUL_EVENTS
      });

      await testAction({
        id: "menulist_label",
        actionName: "click",
        eventSeq: [
          [EVENT_FOCUS, getNode("menulist")]
        ]
      });

      /*, // XXX: bug 490288
      await testAction({
        id: "buttonmenu_item",
        actionName: "click",
        events: CLICK_EVENTS
      })
        */

      is(getAccessible("name_entry_label").firstChild.actionCount, 1, "label text should have 1 action");

      SimpleTest.finish();
    }

    SimpleTest.waitForExplicitFinish();
    addA11yLoadEvent(doTest);
  ]]>
  </script>

  <hbox flex="1" style="overflow: auto;">
    <body xmlns="http://www.w3.org/1999/xhtml">
      <a target="_blank" rel="opener"
         href="https://bugzilla.mozilla.org/show_bug.cgi?id=410765"
         title="nsIAccessible actions testing">
        Mozilla Bug 410765
      </a>
      <a target="_blank" rel="opener"
         href="https://bugzilla.mozilla.org/show_bug.cgi?id=504252"
         title="Expose STATE_HASPOPUP on XUL elements that have an @popup attribute">
        Mozilla Bug 504252
      </a><br/>
      <p id="display"></p>
      <div id="content" style="display: none">
      </div>
      <pre id="test">
      </pre>
    </body>

    <vbox flex="1">
      <menubar>
        <menu label="menu" id="menu">
          <menupopup nonnative="">
            <menuitem label="menu item" id="menuitem"/>
            <menu label="submenu" id="submenu">
              <menupopup nonnative="">
                <menuitem label="menu item"/>
              </menupopup>
            </menu>
          </menupopup>
        </menu>
      </menubar>

      <button label="button" id="button"/>

      <button type="menu" id="buttonmenu" label="button">
        <menupopup>
          <menuitem label="item1" id="buttonmenu_item"/>
          <menuitem label="item1"/>
        </menupopup>
      </button>

      <label id="labelWithPopup" value="file name"
             popup="fileContext"
             tabindex="0"/>
      <hbox>
        <label id="name_entry_label" value="Name" control="name_entry"/>
        <html:input id="name_entry"/>
      </hbox>
      <toolbarbutton id="toolbarbutton">
        <label id="toolbarbutton_label">toolbarbutton</label>
      </toolbarbutton>
      <hbox>
        <label id="menulist_label" control="menulist">menulist</label>
        <menulist id="menulist"/>
      </hbox>
    </vbox>
  </hbox>
</window>
