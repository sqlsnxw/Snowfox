schema: 1

bugzilla:
  product: "Core"
  component: "WebRTC: Networking"

origin:
  name: "libsrtp"
  description: "Secure Real-time Transport Protocol (SRTP)"

  url: "https://github.com/cisco/libsrtp/"
  license: BSD-3-Clause
  license-file: LICENSE

  release: v2.8.0 (2026-03-14T10:49:34+01:00).
  revision: v2.8.0


updatebot:
  maintainer-phab: jesup
  maintainer-bz: rjesup@jesup.org
  tasks:
    - type: vendoring
      enabled: True

vendoring:
  url: https://github.com/cisco/libsrtp
  source-hosting: github
  tracking: tag
  vendor-directory: third_party/libsrtp/src

  exclude:
    - "**"

  patches:
    - 00_use_consistent_printf_types.patch

  include:
    - srtp
    - crypto
    - include
    - test
    - LICENSE
    - CHANGES
    - README.md
