<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,width=device-width">
  <script src="apz_test_utils.js"></script>
  <script src="apz_test_native_event_utils.js"></script>
  <script src="/tests/SimpleTest/paint_listener.js"></script>
</head>
<style>
html {
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  overscroll-behavior-y: none;
}
body {
  margin: 0;
}
.target {
  width: 100%;
  height: 100vh;
  scroll-snap-align: start;
  background: lightblue;
}
</style>
<div class="target"></div>
<div style="height: 2000vh"></div>
<script>
// The pan ends back at the original snap position so that, in
// ScrollSnapToDestination, the snap destination equals the current visual
// scroll offset and SmoothScrollTo() takes its no-movement early return.
// The queued transform-end from OnPanEnd must still fire so that scrollend
// is dispatched.
//
// NOTE: Linux uses mSimulateMomentum which routes pan-end through
// HandleEndOfPan instead of the OnPanEnd → ScrollSnapToDestination path
// exercised by this test so this test don't fail on Linux.
async function test() {
  is(window.scrollY, 0, "Initial position should be snapped to top of target");

  let scrollendCount = 0;
  window.addEventListener("scrollend", () => { scrollendCount += 1; });
  const scrollendPromise = promiseScrollend();

  await NativePanHandler.promiseNativePanEvent(
    window, 100, 100, 0, 0,
    NativePanHandler.beginPhase);

  // Scroll down so the APZC transitions into a transforming state.
  await NativePanHandler.promiseNativePanEvent(
    window, 100, 100, 0, NativePanHandler.delta,
    NativePanHandler.updatePhase);

  await promiseFrame();

  // Scroll back up by more than we scrolled down, so the visual offset
  // clamps at scrollY=0, which is the snap target.
  await NativePanHandler.promiseNativePanEvent(
    window, 100, 100, 0, -NativePanHandler.delta * 5,
    NativePanHandler.updatePhase);

  await promiseFrame();

  await NativePanHandler.promiseNativePanEvent(
    window, 100, 100, 0, 0,
    NativePanHandler.endPhase);

  await scrollendPromise;

  is(window.scrollY, 0, "Should be snapped to top after pan-end");
  is(scrollendCount, 1, "Exactly one scrollend event should fire");
}

if (getPlatform() == "android") {
  // We don't support native pan gestures on Android.
  ok(true, "Skipping test on " + getPlatform());
  subtestDone();
} else {
  waitUntilApzStable()
    .then(test)
    .then(subtestDone, subtestFailed);
}
</script>
</html>
