<!DOCTYPE>
<html>
<head>
  <meta charset="utf-8">
  <title>Tests for various scroll position updates</title>
  <script src="/tests/SimpleTest/SimpleTest.js"></script>
  <script type="application/javascript" src="apz_test_utils.js"></script>
  <link rel="stylesheet" type="text/css" href="/tests/SimpleTest/test.css"/>
  <script type="application/javascript">

var subtests = [
  {"file": "helper_scroll_position_update_on_clamp.html",
   "prefs": [["layout.disable-pixel-alignment", true]]},
  {"file": "helper_relative_scroll_update_negative_offset.html",
   "prefs": [["apz.test.logging_enabled", true],
             ["apz.overscroll.enabled", false]]},
];

if (isApzEnabled()) {
  SimpleTest.waitForExplicitFinish();
  window.onload = function() {
    runSubtestsSeriallyInFreshWindows(subtests)
    .then(SimpleTest.finish, SimpleTest.finishWithFailure);
  };
}

  </script>
</head>
<body>
</body>
</html>
