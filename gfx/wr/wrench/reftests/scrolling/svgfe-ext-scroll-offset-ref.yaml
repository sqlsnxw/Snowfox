# Equivalent unscrolled content: a green rect at the same on-screen position,
# with no external scroll offset and no filter.
root:
  items:
    - type: scroll-frame
      bounds: [0, 0, 100, 100]
      content-size: [100, 1000]
      scroll-offset: [0, -50]
      items:
        - type: rect
          color: green
          bounds: [0, 0, 100, 100]
