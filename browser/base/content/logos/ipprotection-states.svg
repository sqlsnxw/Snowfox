<!--
     Sprite for the IP Protection toolbar button. Each state's artwork is
     tiled horizontally; a <view> fragment selects which strip to paint:
       #off, #on, #error, #paused, #excluded, #info
     Sharing one document means swapping classes never triggers a fresh
     image load. The layout is horizontal (not vertical) because the icon
     container's CSS width is locked to 48px, so content beyond x=48
     can't bleed into the viewport's letterbox area when the container's
     height exceeds the sprite's 16px strip (bug 2034698).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="16" fill="none" viewBox="0 0 48 16">
  <view id="off"      viewBox="0   0 48 16"/>
  <view id="on"       viewBox="48  0 48 16"/>
  <view id="error"    viewBox="96  0 48 16"/>
  <view id="paused"   viewBox="144 0 48 16"/>
  <view id="excluded" viewBox="192 0 48 16"/>
  <view id="info"     viewBox="240 0 48 16"/>

