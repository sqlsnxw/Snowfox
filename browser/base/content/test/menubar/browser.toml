[DEFAULT]
prefs = [
  "browser.sessionstore.closedTabsFromAllWindows=true",
  "browser.sessionstore.closedTabsFromClosedWindows=true",
]
tags = "os_integration"
head = "head.js"
support-files = ["file_shareurl.html"]

["browser_aiwindow_options.js"]

["browser_file_close_tabs.js"]

["browser_file_menu_import_wizard.js"]

["browser_file_offline.js"]

["browser_file_share_linux.js"]
https_first_disabled = true
run-if = ["os == 'linux'"]

["browser_file_share_macosx.js"]
https_first_disabled = true
run-if = ["os == 'mac'"]

["browser_file_share_win.js"]
https_first_disabled = true
run-if = ["os == 'win'"]

["browser_history_recently_closed_tabs.js"]
run-if = [
  "os == 'linux'",
  "os == 'win'",
] # No menubar on macOS.

["browser_macos_application_set_as_default.js"]
run-if = [
  "os == 'mac'", # Mac only feature
]
["browser_search_bookmarks.js"]

["browser_search_history.js"]
