[DEFAULT]
prefs = [
  "browser.backup.enabled=true",
  "browser.backup.archive.enabled=true",
  "browser.backup.restore.enabled=true",
  "browser.backup.scheduled.enabled=false",
  # Profile backup is disabled when SQLite at-rest encryption is on
  # (Bug 1996558); run these tests with it off (the production default).
  "security.storage.encryption.sqlite.enabled=false",
]
support-files = [
  "head.js",
]

["browser_backup_policies.js"]

["browser_password_validation_inputs.js"]

["browser_settings.js"]
skip-if = [
  "os == 'linux' && os_version == '24.04' && display == 'x11' && tsan", # Bug 2000907
]

["browser_settings_create_backup.js"]

["browser_settings_enable_backup_encryption.js"]

["browser_settings_errors.js"]

["browser_settings_restore_from_backup.js"]
skip-if = [
  "os == 'win' && os_version == '11.26200'", # Bug 2019745
]

["browser_settings_turn_off_scheduled_backups.js"]

["browser_settings_turn_on_scheduled_backups.js"]
