[DEFAULT]
prefs = [
    "browser.backup.scheduled.enabled=false",
    "browser.backup.archive.enabled=true",
    "browser.backup.restore.enabled=true",
    "privacy.sanitize.sanitizeOnShutdown=false",
    # Profile backup is disabled when SQLite at-rest encryption is on
    # (Bug 1996558); run these tests with it off (the production default).
    "security.storage.encryption.sqlite.enabled=false"
]
