["browser_bug1020245_openPreferences_to_paneContent.js"]

["browser_build_font_options_test.js"]

["browser_checkspelling.js"]

["browser_colors_dialog.js"]

["browser_fluent.js"]

["browser_legacy_pane_mappings.js"]

["browser_no_id_collision_between_categories_and_mainPane.js"]

["browser_open_migration_wizard.js"]

["browser_privacy_trustPanelBreachAlerts.js"]

["browser_setting_group_in_progress.js"]

["browser_setting_pane_redesign_promo.js"]

["browser_setting_pane_scroll_restoration.js"]

["browser_setting_pane_sub_pane.js"]

["browser_setting_pane_sub_pane_search.js"]

