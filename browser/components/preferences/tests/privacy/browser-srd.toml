[DEFAULT]
dupe-manifest = true
prefs = [
  "browser.settings-redesign.enabled=true",
  # Push BackupService idle observer past test runtime; otherwise
  # takeMeasurements -> PathUtils.join throws on empty
  # DEFAULT_PARENT_DIR_PATH in headless test environments, surfacing
  # an unhandled rejection in whatever test happens to be running.
  "browser.backup.scheduled.idle-threshold-seconds=86400",
]
support-files = [
  "head.js",
  "privacypane_tests_perwindow.js",
]

tags = "os_integration"

["browser_containers_name_input.js"]

["browser_privacy_dnsoverhttps_policy_srd.js"]

["browser_privacy_dnsoverhttps_srd.js"]

["browser_privacy_history_search_l10n_ids.js"]

["browser_privacy_ipprotection.js"]

["browser_privacy_passwordGenerationAndAutofill_srd.js"]

["browser_privacy_status_card_srd.js"]

["browser_privacy_syncDataClearing_v2.js"]

["browser_privacy_uploadEnabled.js"]

["browser_privacypane_2_srd.js"]
skip-if = [
  "os == 'linux' && os_version == '24.04' && arch == 'x86_64' && display == 'x11' && opt && a11y_checks",
]

["browser_privacypane_3_srd.js"]
skip-if = [
  "os == 'linux' && os_version == '24.04' && arch == 'x86_64' && display == 'x11' && opt && a11y_checks",
]

["browser_sanitizeOnShutdown_prefLocked.js"]

["browser_shutdownClearingExceptions.js"]

["browser_warning_permanent_private_browsing_srd.js"]
