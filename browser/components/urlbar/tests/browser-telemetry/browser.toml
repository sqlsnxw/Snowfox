[DEFAULT]
tags = "urlbar"
support-files = [
  "../browser/head-common.js",
  "head.js",
]

["browser_autofill.js"]
tags = "search-telemetry"

["browser_extension.js"]
tags = "search-telemetry"

["browser_handoff.js"]
tags = "search-telemetry"

["browser_heuristic.js"]
tags = "search-telemetry"

["browser_persisted.js"]
tags = "search-telemetry"
skip-if = [
  "os == 'linux' && os_version == '24.04' && arch == 'x86_64' && display == 'x11' && opt && a11y_checks && swgl", # Bug 1934362
]

["browser_places.js"]
https_first_disabled = true
tags = "search-telemetry"

["browser_remotetab.js"]
tags = "search-telemetry"

["browser_searchmode.js"]
tags = "search-telemetry"
support-files = [
  "urlbarTelemetrySearchSuggestions.sjs",
  "urlbarTelemetrySearchSuggestions.xml",
]

["browser_tabtosearch.js"]
tags = "search-telemetry"


["browser_urlbar_telemetry.js"]
tags = "search-telemetry"
support-files = [
  "urlbarTelemetrySearchSuggestions.sjs",
  "urlbarTelemetrySearchSuggestions.xml",
]

["browser_zeroPrefix.js"]
tags = "search-telemetry"
