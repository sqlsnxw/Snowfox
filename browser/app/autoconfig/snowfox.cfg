// Snowfox app-wide configuration (autoconfig). The first line must be a comment.
// On startup, drop the Snowfox theme into the active profile's chrome/ folder
// (only if not already present, so user edits are preserved). Combined with the
// default toolkit.legacyUserProfileCustomizations.stylesheets=true, this applies
// the purple/black Zen theme to every profile on every platform.
try {
  const { classes: Cc, interfaces: Ci, utils: Cu } = Components;

  const userChromeCss = String.raw`
@namespace url("http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul");

:root {
  --sf-accent: #a855f7;
  --sf-accent-bright: #c084fc;
  --sf-accent-glow: rgba(168, 85, 247, 0.35);
  --sf-bg: #09070e;
  --sf-surface: #16101f;
  --sf-border: rgba(168, 85, 247, 0.16);
  --sf-text: #ece6ff;
  --sf-hover: rgba(168, 85, 247, 0.14);
  --sf-radius: 12px;
  --sf-tab-radius: 10px;
  --sf-page-radius: 12px;
  --sf-speed: 0.16s;
  --toolbar-bgcolor: transparent !important;
  --toolbarbutton-hover-background: var(--sf-hover) !important;
  --toolbarbutton-active-background: var(--sf-accent-glow) !important;
  --tab-selected-bgcolor: var(--sf-surface) !important;
  --lwt-accent-color: var(--sf-bg) !important;
  --toolbar-field-background-color: var(--sf-surface) !important;
  --toolbar-field-focus-background-color: var(--sf-surface) !important;
}

#main-window,
#navigator-toolbox,
#tabbrowser-tabbox { background-color: var(--sf-bg) !important; }
#navigator-toolbox { border-bottom: none !important; }
#titlebar { -moz-window-dragging: drag; }

#tabbrowser-tabpanels,
.browserStack browser { border-radius: var(--sf-page-radius) !important; }
#appcontent #tabbrowser-tabpanels {
  margin: 6px 8px 8px 4px !important;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45) !important;
  overflow: hidden !important;
}

#sidebar-main,
#vertical-tabs { background-color: var(--sf-bg) !important; border: none !important; }
#sidebar-main { padding-inline: 6px !important; }
#sidebar-splitter { border: none !important; background-color: transparent !important; }

.tabbrowser-tab { margin-block: 2px !important; }
.tab-background {
  border-radius: var(--sf-tab-radius) !important;
  border: 1px solid transparent !important;
  transition: background-color var(--sf-speed) ease, border-color var(--sf-speed) ease !important;
}
.tabbrowser-tab[selected] .tab-background {
  background: linear-gradient(180deg, var(--sf-surface), #120d1c) !important;
  border-color: var(--sf-border) !important;
  box-shadow: 0 0 0 1px var(--sf-accent-glow), 0 2px 10px rgba(0, 0, 0, 0.4) !important;
}
.tabbrowser-tab:not([selected]):hover .tab-background { background-color: var(--sf-hover) !important; }
.tab-line { display: none !important; }

#TabsToolbar { background-color: var(--sf-bg) !important; padding-inline: 6px !important; }
#tabbrowser-tabs[orient="horizontal"] .tabbrowser-tab { min-height: 32px !important; }

#nav-bar {
  background-color: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding-block: 6px !important;
  padding-inline: 8px !important;
}
#urlbar, #searchbar { --urlbar-height: 38px !important; }
#urlbar-background {
  border-radius: 19px !important;
  background-color: var(--sf-surface) !important;
  border: 1px solid var(--sf-border) !important;
  transition: border-color var(--sf-speed) ease, box-shadow var(--sf-speed) ease !important;
}
#urlbar[focused] #urlbar-background {
  border-color: var(--sf-accent) !important;
  box-shadow: 0 0 0 3px var(--sf-accent-glow) !important;
}
.urlbarView { border-radius: var(--sf-radius) !important; margin-top: 4px !important; }

toolbarbutton, .toolbarbutton-1 { border-radius: var(--sf-radius) !important; }
.toolbarbutton-1:hover { background-color: var(--sf-hover) !important; }

#save-to-pocket-button,
#fxa-toolbar-menu-button,
#firefox-view-button,
#pageActionButton,
#reader-mode-button:not([readeractive]),
#alltabs-button { display: none !important; }
#PersonalToolbar { display: none !important; }

menupopup, panel, .panel-arrowcontent { border-radius: var(--sf-radius) !important; }
menupopup { --panel-background: var(--sf-surface) !important; --panel-border-color: var(--sf-border) !important; }
.findbar-container { border-radius: var(--sf-radius) !important; background: var(--sf-surface) !important; }
`;

  const userContentCss = String.raw`
@-moz-document url-prefix("about:preferences") {
  #category-ai-features,
  moz-page-nav-button#category-ai-features,
  groupbox[data-category="paneAiControls"],
  #aiControlsGroup,
  #aiFeatures,
  #aiControlsDescription,
  #aiStatesDescription { display: none !important; }
  backup-settings,
  #dataBackupGroup,
  #backupGroup { display: none !important; }
}
`;

  const profDir = Cc["@mozilla.org/file/directory_service;1"]
    .getService(Ci.nsIProperties)
    .get("ProfD", Ci.nsIFile);
  const chromeDir = profDir.clone();
  chromeDir.append("chrome");
  if (!chromeDir.exists()) {
    chromeDir.create(Ci.nsIFile.DIRECTORY_TYPE, 0o755);
  }

  function writeIfAbsent(name, data) {
    const f = chromeDir.clone();
    f.append(name);
    if (f.exists()) {
      return;
    }
    const stream = Cc["@mozilla.org/network/file-output-stream;1"]
      .createInstance(Ci.nsIFileOutputStream);
    // PR_WRONLY | PR_CREATE_FILE | PR_TRUNCATE
    stream.init(f, 0x02 | 0x08 | 0x20, 0o644, 0);
    const conv = Cc["@mozilla.org/intl/converter-output-stream;1"]
      .createInstance(Ci.nsIConverterOutputStream);
    conv.init(stream, "UTF-8");
    conv.writeString(data);
    conv.close();
  }

  writeIfAbsent("userChrome.css", userChromeCss);
  writeIfAbsent("userContent.css", userContentCss);
} catch (e) {
  Components.utils.reportError(e);
}
