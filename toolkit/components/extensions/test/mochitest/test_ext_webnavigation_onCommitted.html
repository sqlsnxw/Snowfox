<!DOCTYPE HTML>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNavigation onCommitted Test</title>
  <script type="text/javascript" src="/tests/SimpleTest/SimpleTest.js"></script>
  <script type="text/javascript" src="/tests/SimpleTest/ExtensionTestUtils.js"></script>
  <script type="text/javascript" src="head.js"></script>
  <link rel="stylesheet" href="/tests/SimpleTest/test.css"/>
</head>
<body>

<script type="text/javascript">
"use strict";

add_task(async function test_onCommitted_basic_top() {
  const extension = ExtensionTestUtils.loadExtension({
    manifest: {
      permissions: ["webNavigation", "tabs"],
    },
    async background() {
      const url = "https://example.com/?dummy";
      const [tab, tabDetails] = await Promise.all([
        browser.tabs.create({url}),
        new Promise(resolve => {
          browser.webNavigation.onCommitted.addListener(details => {
            if (details.url === "about:blank") {
              // skip initial about:blank
              return;
            }
            resolve(details);
          });
        }),
      ]);

      browser.test.assertEq(url, tabDetails.url, "webNavigation.onCommitted detects correct url");
      browser.test.assertEq(tab.id, tabDetails.tabId, "webNavigation.onCommitted fire for proper tabId");
      await browser.tabs.remove(tab.id);
      browser.test.notifyPass("webNavigation.onCommitted");
    },
  });

  await extension.startup();
  await extension.awaitFinish("webNavigation.onCommitted");
  await extension.unload();
});

// Regression test for https://bugzilla.mozilla.org/show_bug.cgi?id=1750196
add_task(async function test_onCommitted_cross_origin_iframe() {
  const extension = ExtensionTestUtils.loadExtension({
    manifest: {
      permissions: ["webNavigation", "tabs"],
    },
    async background() {
      const BASE = "https://example.com/tests/toolkit/components/extensions/test/mochitest/";
      const TOP_URL_END = "file_with_xorigin_frame.html"; // at example.com
      const FRAME_URL_END = "file_sample.html"; // at example.net

      const deferredTab = Promise.withResolvers();
      let tab;
      const seenCommitted = [];
      browser.webNavigation.onCommitted.addListener(async details => {
        tab ??= await deferredTab.promise;
        if (tab.id !== details.tabId) return;
        const fileName = details.url.split("/").pop();
        seenCommitted.push(fileName);
        if (fileName === TOP_URL_END) {
          browser.test.assertEq(0, details.frameId, "Top frameId is 0");
        } else if (fileName === FRAME_URL_END) {
          browser.test.assertTrue(details.frameId > 0, "Child frameId nonzero");
          browser.test.assertEq(0, details.parentFrameId, "Parent frameId 0");
        }
      });
      const onCompletedDetails = await new Promise(resolve => {
        const url = BASE + TOP_URL_END;
        browser.webNavigation.onCompleted.addListener(details => {
          if (details.url === url) resolve(details);
        });
        deferredTab.resolve(browser.tabs.create({ url }));
      });
      await browser.tabs.remove(tab.id);

      // Sanity check:
      browser.test.assertEq(
        tab.id,
        onCompletedDetails.tabId,
        "onCompleted event was fired for the expected tabId"
      );

      browser.test.assertDeepEq(
        [TOP_URL_END, FRAME_URL_END],
        seenCommitted,
        "Seen one onCommitted for the top document, and one for the child frame"
      );

      browser.test.notifyPass("webNavigation.onCommitted_subframe");
    },
  });

  await extension.startup();
  await extension.awaitFinish("webNavigation.onCommitted_subframe");
  await extension.unload();
});
</script>

</body>
</html>
