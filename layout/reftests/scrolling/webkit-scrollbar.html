<!DOCTYPE html>
<style>
.scrollable {
  overflow: scroll;
  height: 100px;
  width: 100px;
  border: 2px solid black;
}
.scrollable::before {
  display: block;
  content: "overflowing content";
  height: 300px;
  width: 300px;
}
.pseudo8::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
.pseudo20::-webkit-scrollbar {
  width: 20px;
  height: 20px;
}
</style>
<div class="scrollable"></div>
<div class="scrollable pseudo8"></div>
<div class="scrollable pseudo20"></div>
