      if (os == "mac") and (version == "OS X 15.3") and not debug: [NOTRUN, FAIL, TIMEOUT]
      if (os == "mac") and (version == "OS X 14.7.5"): [TIMEOUT, FAIL, NOTRUN]
      FAIL

  [touch-action:pan-x with down,right swipe]
    expected:
      if (os == "mac") and (version == "OS X 15.3") and not debug: [NOTRUN, PASS]
      if (os == "mac") and (version == "OS X 14.7.5"): [NOTRUN, TIMEOUT]

  [touch-action:pan-y with right,down swipe]
    expected:
      if (os == "mac") and not debug and (version == "OS X 15.3"): [NOTRUN, PASS]
      if (os == "mac") and not debug and (version == "OS X 14.7.5"): NOTRUN

  [touch-action:pan-y with down,right swipe]
    expected:
      if (os == "mac") and not debug and (version == "OS X 15.3"): [NOTRUN, FAIL]
      if (os == "mac") and not debug and (version == "OS X 14.7.5"): NOTRUN
      FAIL

  [touch-action:none with down,right swipe]
    expected:
      if (os == "mac") and not debug: [NOTRUN, PASS, TIMEOUT]

  [touch-action:none with right,down swipe]
    expected:
      if (os == "mac") and not debug and (version == "OS X 15.3"): [NOTRUN, PASS, TIMEOUT]
      if (os == "mac") and not debug and (version == "OS X 14.7.5"): NOTRUN
      if (os == "mac") and debug: [PASS, TIMEOUT, NOTRUN]
