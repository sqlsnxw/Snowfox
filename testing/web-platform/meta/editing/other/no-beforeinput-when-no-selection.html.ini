[no-beforeinput-when-no-selection.html]
  expected:
    if asan: [TIMEOUT, OK]
    [OK, TIMEOUT]
  [Typing Delete]
    expected:
      if asan: [TIMEOUT, PASS, NOTRUN]
      [PASS, TIMEOUT]

  [Typing Enter]
    expected:
      if asan: [NOTRUN, PASS]
      [PASS, NOTRUN]

  [Typing Shift + Enter]
    expected:
      if asan: [NOTRUN, PASS]
      [PASS, NOTRUN]

  [Typing Backspace]
    expected:
      if asan: [PASS, TIMEOUT]
