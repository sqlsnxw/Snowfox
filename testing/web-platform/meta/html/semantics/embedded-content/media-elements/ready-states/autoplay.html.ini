[autoplay.html]
  disabled:
    if debug and (os == "linux") and (processor == "x86"): https://bugzilla.mozilla.org/show_bug.cgi?id=1482405
  expected:
    if (os == "android") and not debug: [OK, ERROR]
  [audio.autoplay]
    expected: FAIL

  [audio.autoplay and load()]
    expected: FAIL

  [video.autoplay]
    expected: [TIMEOUT, FAIL]

  [video.autoplay and load()]
