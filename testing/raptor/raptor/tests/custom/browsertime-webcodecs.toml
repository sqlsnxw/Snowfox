[DEFAULT]
alert_threshold = 2.0
apps = "firefox, chrome, safari, custom-car"
gecko_profile_interval = 1
expose_browser_profiler = true
lower_is_better = true
owner = ":chunmin and Media Team"
page_cycles = 3
page_timeout = 360000
support_class = "browsertime_benchmark.py"
test_url = "http://<host>:<port>/index.html?raptor"
type = "benchmark"
unit = "score"
repository = "https://github.com/mozilla/perf-automation"
repository_revision = "8fd150ac2ede429d5a927e25c04159e57760ac81"
repository_path = "benchmarks/webcodecs"
sparse_checkout = true

["ve-av1-rt"]
