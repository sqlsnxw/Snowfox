[DEFAULT]
head = "head.js"
tags = "condprof inc-origin-init"
support-files = [
  "archive_profile.zip",
  "corruptedDatabase_profile.zip",
  "corruptedDatabase_missingUsageFile_profile.zip",
  "groupMismatch_profile.zip",
  "migration_profile.zip",
  "open_and_multiple_preloads_child.js",
  "schema3upgrade_profile.zip",
  "schema4upgrade_profile.zip",
  "slowDatabaseInitialization_child.js",
  "slowRequestFinalization_child.js",
  "somedata_profile.zip",
  "stringLength2_profile.zip",
  "stringLength_profile.zip",
  "usageAfterMigration_profile.zip",
]

["make_migration_emptyValue.js"]
run-if = [
  "false", # Only used for recreating migration_emptyValue_profile.zip
]

["make_somedata.js"]
run-if = [
  "false", # Only used for recreating somedata_profile.zip
]

["test_archive.js"]

["test_clientValidation.js"]

["test_corruptedDatabase.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]

["test_databaseShadowing1.js"]
prefs = ["dom.storage.shadow_writes=true", "security.storage.encryption.sqlite.enabled=false"]
run-sequentially = ["true"] # test_databaseShadowing2.js depends on a file produced by this test

["test_databaseShadowing2.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]
run-sequentially = ["true"] # this test depends on a file produced by test_databaseShadowing1.js

["test_databaseShadowing_clearOrigin1.js"]
prefs = ["dom.storage.shadow_writes=true", "security.storage.encryption.sqlite.enabled=false"]
run-sequentially = ["true"] # test_databaseShadowing_clearOrigin2.js depends on a file produced by this test

["test_databaseShadowing_clearOrigin2.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]
run-sequentially = ["true"] # this test depends on a file produced by test_databaseShadowing_clearOrigin1.js

["test_databaseShadowing_clearOriginsByPattern1.js"]
prefs = ["dom.storage.shadow_writes=true", "security.storage.encryption.sqlite.enabled=false"]
run-sequentially = ["true"] # test_databaseShadowing_clearOriginsByPattern2.js depends on a file produced by this test

["test_databaseShadowing_clearOriginsByPattern2.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]
run-sequentially = ["true"] # this test depends on a file produced by test_databaseShadowing_clearOriginsByPattern1.js

["test_databaseShadowing_clearOriginsByPrefix1.js"]
prefs = ["dom.storage.shadow_writes=true", "security.storage.encryption.sqlite.enabled=false"]
run-sequentially = ["true"] # test_databaseShadowing_clearOriginsByPrefix2.js depends on a file produced by this test

["test_databaseShadowing_clearOriginsByPrefix2.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]
run-sequentially = ["true"] # this test depends on a file produced by test_databaseShadowing_clearOriginsByPrefix1.js

["test_databaseWorkStarted.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]

["test_eviction.js"]

["test_flushing.js"]

["test_groupLimit.js"]

["test_groupMismatch.js"]

["test_largeItems.js"]

["test_lsng_enabled.js"]

["test_migration.js"]
prefs = [
  "dom.storage.enable_migration_from_unsupported_legacy_implementation=true",
  "security.storage.encryption.sqlite.enabled=false",
]

["test_migration_emptyValue.js"]
prefs = [
  "dom.storage.enable_migration_from_unsupported_legacy_implementation=true",
  "security.storage.encryption.sqlite.enabled=false",
]
support-files = ["migration_emptyValue_profile.zip",]

["test_old_lsng_pref.js"]

["test_open_and_multiple_preloads.js"]

["test_orderingAfterRemoveAdd.js"]
# Asserts that storage.key(i) and Object.keys(storage) agree on order. Both read
# from LSSnapshot's unordered mValues hashmap, so they only agree because
# hashtable iteration is stable within a process. Chaos mode (test-verify)
# randomizes that iteration, breaking the assertion. Pre-existing and benign in
# production; skip under verify.
skip-if = [
  "verify"
]

["test_originInit.js"]

["test_preloading.js"]

["test_requestFinalizationStarted.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]

["test_schema3upgrade.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]

["test_schema4upgrade.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]

["test_shutdownDuringRequestFinalization.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]

["test_slowDatabaseInitialization.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]

["test_slowRequestFinalization.js"]
prefs = ["security.storage.encryption.sqlite.enabled=false"]

["test_slowStorageInitialization.js"]

["test_snapshotting.js"]
requesttimeoutfactor = 2  # Slow on debug
# Asserts that storage.key(i) and Object.keys(storage) agree on order. Both read
# from LSSnapshot's unordered mValues hashmap, so they only agree because
# hashtable iteration is stable within a process. Chaos mode (test-verify)
# randomizes that iteration, breaking the assertion. Pre-existing and benign in
# production; skip under verify.
skip-if = [
  "verify"
]

["test_stringLength.js"]
prefs = [
  "dom.storage.enable_migration_from_unsupported_legacy_implementation=true",
  "security.storage.encryption.sqlite.enabled=false",
]

["test_stringLength2.js"]
prefs = [
  "dom.storage.enable_migration_from_unsupported_legacy_implementation=true",
  "security.storage.encryption.sqlite.enabled=false",
]

["test_unicodeCharacters.js"]

["test_uri_encoding_edge_cases.js"]

["test_usage.js"]

["test_usageAfterMigration.js"]
prefs = [
  "dom.storage.enable_migration_from_unsupported_legacy_implementation=true",
  "security.storage.encryption.sqlite.enabled=false",
]
