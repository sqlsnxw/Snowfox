<!DOCTYPE HTML>
<script>
  var bc = SpecialPowers.wrap(BroadcastChannel).unpartitionedTestingChannel("navigate");
  bc.onmessage = (event) => {
    if (event.data.command == "navigate") {
      window.location = event.data.location;
      bc.close();
    }
  }
  window.onload = () => {
    bc.postMessage({command: "loaded"});
  }
</script>
