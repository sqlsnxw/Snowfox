<!DOCTYPE HTML>
<html>
<head>
  <meta charset="utf-8">
  <title>Test speech is cancelled when the page navigates away</title>
  <script src="/tests/SimpleTest/SimpleTest.js"></script>
  <script type="application/javascript" src="common.js"></script>
  <link rel="stylesheet" type="text/css" href="/tests/SimpleTest/test.css"/>
</head>
<body>
<iframe id="testFrame"></iframe>
<pre id="test">
<script type="application/javascript">

SimpleTest.waitForExplicitFinish();

function onDone() {
  SimpleTest.finish();
}

SpecialPowers.pushPrefEnv(
  { set: [["media.webspeech.synth.enabled", true],
          ["media.webspeech.synth.force_global_queue", true]] },
  function() { loadSpeechTest("file_speech_cancel_on_navigation_page1.html"); }
);

</script>
</pre>
</body>
</html>
