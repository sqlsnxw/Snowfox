// Snowfox hardened defaults (autoconfig). The FIRST line MUST be a comment — do not remove it.
//
// Snowfox's real privacy/anti-fingerprint/anti-metadata layer lives HERE, not in extensions.
// Modeled on Tor Browser / Mullvad Browser / LibreWolf + arkenfox user.js.
//   defaultPref() = sets the default (user can still change it via about:config)
//   lockPref()    = forces the value (user cannot change it)
// Goal: every Snowfox user looks identical and leaks as little metadata as possible.

// ══════════════════════════ 1. FINGERPRINTING RESISTANCE ══════════════════════════
lockPref("privacy.resistFingerprinting", true);                 // the core: uniform UA, screen, timezone, etc.
lockPref("privacy.resistFingerprinting.letterboxing", true);    // round window size to reduce screen fp
defaultPref("privacy.resistFingerprinting.block_mozAddonManager", true);
defaultPref("webgl.disabled", true);                            // WebGL = strong fp vector
defaultPref("dom.webaudio.enabled", false);                     // audio fp
defaultPref("media.navigator.enabled", false);                  // device enumeration fp
defaultPref("device.sensors.enabled", false);
defaultPref("dom.gamepad.enabled", false);
defaultPref("dom.vr.enabled", false);
defaultPref("dom.webmidi.enabled", false);
defaultPref("dom.battery.enabled", false);
defaultPref("dom.netinfo.enabled", false);                      // network info fp
defaultPref("beacon.enabled", false);
defaultPref("javascript.use_us_english_locale", true);          // uniform JS locale
defaultPref("intl.accept_languages", "en-US, en");              // uniform language header
defaultPref("intl.regional_prefs.use_os_locales", false);
defaultPref("gfx.font_rendering.opentype_svg.enabled", false);  // font fp surface

// ══════════════════════════ 2. KILL TELEMETRY / PHONE-HOME ═════════════════════════
lockPref("toolkit.telemetry.enabled", false);
lockPref("toolkit.telemetry.unified", false);
lockPref("toolkit.telemetry.archive.enabled", false);
lockPref("toolkit.telemetry.newProfilePing.enabled", false);
lockPref("toolkit.telemetry.shutdownPingSender.enabled", false);
lockPref("toolkit.telemetry.firstShutdownPing.enabled", false);
lockPref("toolkit.telemetry.coverage.opt-out", true);
lockPref("datareporting.healthreport.uploadEnabled", false);
lockPref("datareporting.policy.dataSubmissionEnabled", false);
lockPref("app.shield.optoutstudies.enabled", false);
lockPref("app.normandy.enabled", false);
lockPref("app.normandy.api_url", "");
lockPref("browser.discovery.enabled", false);
lockPref("browser.ping-centre.telemetry", false);
lockPref("default.crashreporter.enabled", false);
lockPref("breakpad.reportURL", "");
lockPref("browser.tabs.crashReporting.sendReport", false);
lockPref("captivedetect.canonicalURL", "");
lockPref("network.connectivity-service.enabled", false);

// ══════════════════════════ 3. TRANSPORT SECURITY ═════════════════════════════════
defaultPref("dom.security.https_only_mode", true);              // HTTPS everywhere
defaultPref("dom.security.https_only_mode_ever_enabled", true);
defaultPref("security.ssl.require_safe_negotiation", true);
defaultPref("security.tls.enable_0rtt_data", false);
defaultPref("security.OCSP.enabled", 1);
defaultPref("security.OCSP.require", true);
defaultPref("security.cert_pinning.enforcement_level", 2);
defaultPref("network.IDN_show_punycode", true);                // anti-IDN-phishing
defaultPref("security.mixed_content.block_display_content", true);

// ══════════════════════════ 4. TRACKING / COOKIE ISOLATION ════════════════════════
defaultPref("privacy.trackingprotection.enabled", true);
defaultPref("privacy.trackingprotection.socialtracking.enabled", true);
defaultPref("privacy.trackingprotection.cryptomining.enabled", true);
defaultPref("privacy.trackingprotection.fingerprinting.enabled", true);
defaultPref("privacy.partition.network_state", true);
defaultPref("privacy.partition.serviceWorkers", true);
defaultPref("network.cookie.cookieBehavior", 5);               // Total Cookie Protection (dFPI)
defaultPref("privacy.globalprivacycontrol.enabled", true);     // GPC opt-out signal
defaultPref("privacy.globalprivacycontrol.functionality.enabled", true);

// ══════════════════════════ 5. METADATA / REFERER LEAK REDUCTION ══════════════════
defaultPref("network.http.referer.XOriginPolicy", 2);          // referer only on same origin
defaultPref("network.http.referer.XOriginTrimmingPolicy", 2);
defaultPref("network.http.referer.trimmingPolicy", 2);
defaultPref("network.http.sendRefererHeader", 2);
defaultPref("browser.send_pings", false);
defaultPref("geo.enabled", false);
defaultPref("geo.provider.network.url", "");
defaultPref("browser.region.network.url", "");
defaultPref("dom.event.clipboardevents.enabled", false);
defaultPref("network.http.referer.defaultPolicy", 2);

// ══════════════════════════ 6. WebRTC IP-LEAK PROTECTION ══════════════════════════
defaultPref("media.peerconnection.ice.default_address_only", true);
defaultPref("media.peerconnection.ice.no_host", true);
defaultPref("media.peerconnection.ice.proxy_only_if_behind_proxy", true);

// ══════════════════════════ 7. DNS / PREFETCH / PREDICTOR ═════════════════════════
defaultPref("network.trr.mode", 2);                            // DNS-over-HTTPS (with fallback)
defaultPref("network.trr.uri", "https://dns.mullvad.net/dns-query");
defaultPref("network.prefetch-next", false);
defaultPref("network.dns.disablePrefetch", true);
defaultPref("network.dns.disablePrefetchFromHTTPS", true);
defaultPref("network.predictor.enabled", false);
defaultPref("network.predictor.enable-prefetch", false);
defaultPref("browser.urlbar.speculativeConnect.enabled", false);

// ══════════════════════════ 8. DRM / MEDIA / MISC PRIVACY ═════════════════════════
defaultPref("media.eme.enabled", false);                       // disable DRM (set true if you need Netflix)
defaultPref("media.gmp-widevinecdm.enabled", false);
defaultPref("extensions.pocket.enabled", false);
defaultPref("browser.newtabpage.activity-stream.showSponsored", false);
defaultPref("browser.newtabpage.activity-stream.showSponsoredTopSites", false);
defaultPref("browser.formfill.enable", false);
defaultPref("signon.autofillForms", false);
defaultPref("browser.urlbar.suggest.quicksuggest.sponsored", false);
defaultPref("browser.urlbar.suggest.quicksuggest.nonsponsored", false);
defaultPref("browser.search.suggest.enabled", false);          // don't send keystrokes to search engine
defaultPref("browser.urlbar.suggest.searches", false);
defaultPref("keyword.enabled", true);
defaultPref("browser.safebrowsing.downloads.remote.enabled", false); // don't send downloads to Google

// ══════════════════════════ 9. EPHEMERALITY (clear-on-shutdown) ═══════════════════
// Wipe browsing traces when Snowfox closes. Cookies/logins are KEPT by default so
// you stay signed in; flip the two below to true for full Tor-style amnesia.
defaultPref("privacy.sanitize.sanitizeOnShutdown", true);
defaultPref("privacy.clearOnShutdown.cache", true);
defaultPref("privacy.clearOnShutdown.history", true);
defaultPref("privacy.clearOnShutdown.formdata", true);
defaultPref("privacy.clearOnShutdown.downloads", true);
defaultPref("privacy.clearOnShutdown.sessions", true);
defaultPref("privacy.clearOnShutdown.offlineApps", true);
defaultPref("privacy.clearOnShutdown.cookies", false);   // keep logins; set true for full wipe
defaultPref("privacy.clearOnShutdown.siteSettings", false);
// new split prefs (Firefox 128+)
defaultPref("privacy.clearOnShutdown_v2.cache", true);
defaultPref("privacy.clearOnShutdown_v2.historyFormDataAndDownloads", true);
defaultPref("privacy.clearOnShutdown_v2.cookiesAndStorage", false);

// ══════════════════════════ 10. ENCRYPTED CLIENT HELLO + CACHE ════════════════════
defaultPref("network.dns.echconfig.enabled", true);              // hide SNI (which site you visit)
defaultPref("network.dns.http3_echconfig.enabled", true);
defaultPref("network.dns.use_https_rr_as_altsvc.enabled", true);
defaultPref("browser.cache.disk.enable", false);                 // memory-only cache (no disk traces)
defaultPref("browser.cache.memory.enable", true);
defaultPref("browser.privatebrowsing.forceMediaMemoryCache", true);
defaultPref("media.memory_cache_max_size", 65536);

// ══════════════════════════ 11. SNOWFOX UI THEME ═════════════════════════════════
defaultPref("toolkit.legacyUserProfileCustomizations.stylesheets", true); // load userChrome.css
defaultPref("svg.context-properties.content.enabled", true);              // icon theming
defaultPref("browser.uidensity", 0);
defaultPref("browser.tabs.tabMinWidth", 80);
