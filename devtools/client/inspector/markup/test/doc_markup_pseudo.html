<!DOCTYPE html>
<meta charset="utf-8">
<style>
article::before,
article::after {
  content: "";
}

ul::before {
  content: "Animals:";
  display: list-item;
}

ul::before::marker {
  content: "+";
  color: tomato;
}

ul::after {
  content: "-";
}

dialog::backdrop {
  background-color: gold;
}
dialog::before {
  content: "before dialog";
}

select {
  appearance: base-select;
}
select::picker-icon {
  background-color: hotpink;
}

</style>

<article>
  <div>test node</div>
</article>
<ul>
  <li>Dogs</li>
  <li>Cats</li>
</ul>
<dialog><p>My Dialog</p></dialog>
<select>
  <option>Apricot</option>
  <option>Banana</option>
  <option>Cherry</option>
</select>
